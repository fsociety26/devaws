<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Disaster Info</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <style>
        .card-img-top {
          height: 180px;
          object-fit: contain;
        }
      
        .card-wrapper {
          display: flex;
          flex-wrap: wrap;
          gap: 20px; /* Gap between cards */
          justify-content: center;
        }
      
        .custom-card {
          flex: 1 1 calc(33.333% - 13.34px); /* 3 cards per row with spacing */
          max-width: calc(33.333% - 13.34px);
          box-sizing: border-box;
          margin: 10px 0;
        }
      
        @media (max-width: 768px) {
          .custom-card {
            flex: 1 1 100%;
            max-width: 100%;
          }
        }
      </style>
      
      <div class="container my-5">
        <div class="card-wrapper">
      
          <!-- Card 1 -->
          <div class="custom-card">
            <div class="card shadow-sm h-100">
              <img src="../Images/frame1.jpg" class="card-img-top" alt="Environmental Issues">
              <div class="card-body text-center">
                <h5 class="card-title">Environmental Issues</h5>
                <a href="https://en.wikipedia.org/wiki/Environmental_issues" class="card-link text-primary">More info..</a>
              </div>
            </div>
          </div>
      
          <!-- Card 2 -->
          <div class="custom-card">
            <div class="card shadow-sm h-100">
              <img src="../Images/frame2.jpg" class="card-img-top" alt="Social Issues">
              <div class="card-body text-center">
                <h5 class="card-title">Social Issues</h5>
                <a href="https://en.wikipedia.org/wiki/Social_issue" class="card-link text-primary">More info..</a>
              </div>
            </div>
          </div>
      
          <!-- Card 3 -->
          <div class="custom-card">
            <div class="card shadow-sm h-100">
              <img src="../Images/frame3.jpg" class="card-img-top" alt="Infrastructure Problems">
              <div class="card-body text-center">
                <h5 class="card-title">Infrastructure Problems</h5>
                <a href="https://en.wikipedia.org/wiki/Infrastructure" class="card-link text-primary">More info..</a>
              </div>
            </div>
          </div>
      
          <!-- Card 4 -->
          <div class="custom-card">
            <div class="card shadow-sm h-100">
              <img src="../Images/frame4.jpg" class="card-img-top" alt="Education Issues">
              <div class="card-body text-center">
                <h5 class="card-title">Education Issues</h5>
                <a href="https://en.wikipedia.org/wiki/Category:Education_issues" class="card-link text-primary">More info..</a>
              </div>
            </div>
          </div>
      
          <!-- Card 5 -->
          <div class="custom-card">
            <div class="card shadow-sm h-100">
              <img src="../Images/frame5.jpg" class="card-img-top" alt="Health Issues">
              <div class="card-body text-center">
                <h5 class="card-title">Health Issues</h5>
                <a href="https://en.wikipedia.org/wiki/Health" class="card-link text-primary">More info..</a>
              </div>
            </div>
          </div>
      
          <!-- Card 6 -->
          <div class="custom-card">
            <div class="card shadow-sm h-100">
              <img src="../Images/frame6.jpg" class="card-img-top" alt="Crime and Safety Issues">
              <div class="card-body text-center">
                <h5 class="card-title">Crime and Safety Issues</h5>
                <a href="https://en.wikipedia.org/wiki/Crime_prevention" class="card-link text-primary">More info..</a>
              </div>
            </div>
          </div>
      
        </div>
      </div>
      

</body>
</html>
