    <link rel="stylesheet" href="../CSS Files/style.css">

    <nav class="navbar navbar-expand-lg navbar-dark" id="nav_top">
      <div class="container-fluid">
        <img src="../Images/logo.png" alt="logo" class="img-fluid" width="40" height="40">
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent"

        </button>

            <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Registration Form -->
    <div class="container mt-5">
      <div class="card shadow-lg">
        <div class="card-header text-center bg-dark text-white">
          <img src="https://static.thenounproject.com/png/2696193-200.png" height="50" alt="form icon">
          <h3 class="mt-2">Registration Form</h3>
        </div>
        <div class="card-body">
          <form>
            <div class="row mb-3">
              <label class="col-sm-2 col-form-label">Title</label>
              <div class="col-sm-10">
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="title" value="Mr">
                  <label class="form-check-label">Mr.</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="title" value="Mrs">
                  <label class="form-check-label">Mrs.</label>
                </div>
                <div class="form-check form-check-inline">
                  <input class="form-check-input" type="radio" name="title" value="Ms">
                  <label class="form-check-label">Ms.</label>
                </div>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col">
                <input type="text" class="form-control" name="fname" placeholder="First Name">
              </div>
              <div class="col">
                <input type="text" class="form-control" name="lname" placeholder="Last Name">
              </div>
            </div>

            <div class="mb-3">
              <input type="text" class="form-control" name="madd1" placeholder="Mail Address Line 1">
            </div>
            <div class="mb-3">
              <input type="text" class="form-control" name="madd2" placeholder="Mail Address Line 2">
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <select class="form-select" name="state">
                  <option selected disabled>Select State</option>
                  <option>Maharashtra</option>
                  <option>Gujarat</option>
                  <option>Delhi</option>
                  <option>Uttar Pradesh</option>
                  <option>Bihar</option>
                </select>
              </div>
              <div class="col-md-4">
                <input type="text" class="form-control" name="city" placeholder="City">
              </div>
              <div class="col-md-2">
                <input type="text" class="form-control" name="zip" placeholder="ZIP">
              </div>
            </div>

            <div class="mb-3">
              <input type="email" class="form-control" name="email" placeholder="Email">
            </div>
            <div class="mb-3">
              <input type="tel" class="form-control" name="phone" placeholder="Mobile No.">
            </div>

            <div class="mb-3">
              <label class="form-label">Upload Photo</label>
              <input type="file" class="form-control" name="photo">
            </div>

            <div class="mb-3">
              <label class="form-label">Languages Known</label><br>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="lang" value="Hindi">
                <label class="form-check-label">Hindi</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="lang" value="Marathi">
                <label class="form-check-label">Marathi</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="lang" value="Gujarati">
                <label class="form-check-label">Gujarati</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="checkbox" name="lang" value="Bhojpuri">
                <label class="form-check-label">Bhojpuri</label>
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Additional Information</label>
              <textarea class="form-control" rows="3" placeholder="Optional"></textarea>
            </div>

            <div class="d-flex justify-content-between">
              <button type="submit" class="btn btn-primary">Submit</button>
              <button type="reset" class="btn btn-secondary">Reset</button>
            </div>

            <div class="mt-3 text-center">
              <p>Already have an account? <a href="login.html">Login here</a></p>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white pt-4 pb-3 mt-5">

          <a href="#" class="text-white text-decoration-none">Contact Us</a>
        </div>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
